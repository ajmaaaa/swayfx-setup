# ==========================================
#  ALACRITTY CONFIGURATION (Aesthetic Tokyo Night)
# ==========================================

[env]
TERM = "xterm-256color"

[window]
padding = { x = 6, y = 6 }  # Sedikit ditambah agar lebih lega
decorations = "None"
opacity = 0.75              # Naikkan sedikit agar teks lebih terbaca di wallpaper putih
dynamic_title = true
title = "Alacritty"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 13.5 # Sedikit dikecilkan agar proporsional dengan padding

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

# ==========================================
#  COLORS SCHEME: TOKYO NIGHT STORM (Modified)
#  Estetik, tidak norak, dan kontras tinggi
# ==========================================

[colors.primary]
# Background agak kebiruan gelap (bukan hitam mati) agar elegan
background = "#1a1b26"
# Foreground putih gading (tidak putih mati) agar tidak silau
foreground = "#c0caf5"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

# --- SOLUSI TEXT HISTORY ---
# Warna ini (Bright Black) biasanya dipakai autosuggestion.
# Saya buat 'Abu-abu Medium' (#565f89). 
# Cukup terang untuk terlihat di background hitam, 
# tapi cukup gelap untuk terlihat di background putih transparan.

[colors.normal]
black   = "#15161e"
red     = "#f7768e"  # Merah Soft (Coral)
green   = "#9ece6a"  # Hijau Matcha
yellow  = "#e0af68"  # Kuning Amber
blue    = "#7aa2f7"  # Biru Langit
magenta = "#bb9af7"  # Ungu Pastel
cyan    = "#7dcfff"  # Cyan Laut
white   = "#a9b1d6"  # Putih Awan

[colors.bright]
black   = "#565f89"  # <--- INI KUNCI AGAR HISTORY TERLIHAT
red     = "#ff9e64"  # Orange (Variasi dari merah)
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# ==========================================
#  KEY BINDINGS
# ==========================================
[keyboard]
bindings = [
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]
