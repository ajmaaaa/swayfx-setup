[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = celestial.png
background-fill-mode = fill

[LockScreen]
display = true
background = celestial-veil.3840x2160.mp4
use-background-color = false
background-color = #000000
blur = 30
brightness = -0.1
saturation = 1.0

; === TETAP TIDAK DIUBAH (Jam tetap center-center) ===
[LockScreen.Clock]
display = true
position = center-center
align = center
format = HH:mm
font-family = "RedHatDisplay"
font-size = 120
font-weight = 900
color = #ffffff
margin-top = 0
margin-bottom = 0

[LockScreen.Date]
display = true
format = dddd, MMMM dd, yyyy
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 25
font-weight = 600
color = #ffffff
margin-top = 15
margin-bottom = 0

; === PENYESUAIAN KRITIS UNTUK POSISI VERTIKAL CENTER ===
[LoginScreen]
background = celestial-veil.3840x2160.mp4
use-background-color = false
background-color = #000000
blur = 5
brightness = -0.1
saturation = 1.0

[LoginScreen.LoginArea]
; HAPUS SEMUA PARAMETER POSITION & MARGIN
; Gunakan KOMBINASI position=bottom-center + offset-y NEGATIF
position = bottom-center
offset-y = -400  ; Nilai kunci untuk center vertikal (sesuaikan)
; JANGAN PAKAI margin-top/margin-bottom di sini

; === AVATAR & KOMPONEN (Tetapkan margin internal POSITIF) ===
[LoginScreen.LoginArea.Avatar]
shape = circle
active-size = 120
inactive-size = 100
inactive-opacity = 0.6
active-border-size = 3
inactive-border-size = 2
active-border-color = #ffffff
inactive-border-color = #ffffff
; JANGAN PAKAI margin-top NEGATIF
margin-top = 20  ; Jarak dari atas login area
margin-bottom = 15

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 20
font-weight = 700
color = #ffffff
margin-top = 10  ; Jarak dari avatar
margin-bottom = 5

[LoginScreen.LoginArea.PasswordInput]
width = 250
height = 40
display-icon = true
font-family = "RedHatDisplay"
font-size = 14
icon = password.svg
icon-size = 20
content-color = #ffffff
background-color = #000000
background-opacity = 0.2
border-size = 2
border-color = #ffffff
border-radius-left = 15
border-radius-right = 15
margin-top = 15  ; Jarak dari username
margin-bottom = 15

[LoginScreen.LoginArea.LoginButton]
background-color = #ffffff
background-opacity = 0.0
active-background-color = #ffffff
active-background-opacity = 1.0
icon = arrow-right.svg
icon-size = 20
content-color = #ffffff
active-content-color = #000000
border-size = 2
border-color = #ffffff
border-radius-left = 15
border-radius-right = 15
margin-left = 10
margin-top = 5  ; Jarak dari password field
show-text-if-no-password = true
hide-if-not-needed = true
font-family = "RedHatDisplay"
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Authenticating..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 24
icon = spinner.svg
color = #FFFFFF
spacing = 10

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 12
font-weight = 500
normal-color = #FFFFFF
warning-color = #ffbd44
error-color = #ff605c
margin-top = 15

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 50
margin-left = 50
size = 35
border-radius = 8
spacing = 15
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 35
item-spacing = 2
padding = 10
display-scrollbar = false
margin = 10
background-color = #000000
background-opacity = 0.8
active-option-background-color = #ffffff
active-option-background-opacity = 1.0
content-color = #ffffff
active-content-color = #000000
font-family = "RedHatDisplay"
border-size = 2
border-color = #ffffff
font-size = 12
icon-size = 18

[LoginScreen.MenuArea.Session]
display = true
position = bottom-left
index = 4
popup-direction = up
popup-align = left
display-session-name = true
button-width = 140
popup-width = 220
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #ffffff
active-content-color = #000000
border-size = 0
font-size = 12
icon-size = 18

[LoginScreen.MenuArea.Layout]
display = true
position = bottom-left
index = 3
popup-direction = up
popup-align = center
popup-width = 180
display-layout-name = true
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #ffffff
active-content-color = #000000
border-size = 0
font-size = 12
icon = language.svg
icon-size = 18

[LoginScreen.MenuArea.Keyboard]
display = true
position = bottom-left
index = 2
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #ffffff
active-content-color = #000000
border-size = 0
icon = keyboard.svg
icon-size = 18

[LoginScreen.MenuArea.Power]
display = true
position = bottom-left
index = 1
popup-direction = up
popup-align = left
popup-width = 120
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #ffffff
active-content-color = #000000
border-size = 0
icon = power.svg
icon-size = 18

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = login
start-hidden = true
background-color = #000000
background-opacity = 0.85
key-content-color = #ffffff
key-color = #000000
key-opacity = 1.0
key-active-background-color = #ffffff
key-active-opacity = 1.0
key-active-content-color = #000000
selection-background-color = #303030
selection-content-color = #ffffff
primary-color = #ffffff
border-size = 2
border-color = #ffffff

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 12
content-color = #000000
background-color = #ffffff
background-opacity = 0.9
border-radius = 5
disable-user = false
disable-login-button = false
