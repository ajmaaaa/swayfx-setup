[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = celestial.png
background-fill-mode = fill

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = celestial-veil.3840x2160.mp4
use-background-color = false
background-color = #000000
blur = 30
brightness = -0.05
saturation = 0.8

[LockScreen.Clock]
display = true
position = center-left
align = left
format = HH:mm
font-family = "RedHatDisplay"
font-size = 120
font-weight = 900
color = #ffffff
margin-top = 0
margin-bottom = 0
; Efek cahaya halus seperti lingkaran dalam wallpaper
glow = true
glow-radius = 15
glow-color = #e0e0e0

[LockScreen.Date]
display = true
format = dddd, MMMM dd, yyyy
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 25
font-weight = 600
color = #e0e0e0  ; Abu-abu terang untuk kontras lebih halus
margin-top = 15
margin-bottom = 0

[LockScreen.Message]
display = false
position = bottom-center
align = center
text = "Press any key to unlock"
font-family = "RedHatDisplay"
font-size = 14
font-weight = 400
display-icon = true
icon = enter.svg
icon-size = 18
color = #c0c0c0
paint-icon = true
spacing = 5
margin-top = 50

[LoginScreen]
background = celestial-veil.3840x2160.mp4
use-background-color = false
background-color = #000000
blur = 5
brightness = -0.05
saturation = 0.8

[LoginScreen.LoginArea]
position = center
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = circle
active-size = 120
inactive-size = 100
inactive-opacity = 0.5
active-border-size = 3
inactive-border-size = 2
active-border-color = #ffffff
inactive-border-color = #c0c0c0
; Efek cahaya halus pada avatar
glow = true
glow-radius = 10
glow-color = #e0e0e0

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 20
font-weight = 700
color = #ffffff
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 250
height = 40
display-icon = true
font-family = "RedHatDisplay"
font-size = 14
icon = password.svg
icon-size = 20
content-color = #ffffff
background-color = #000000
background-opacity = 0.3
border-size = 1.5
border-color = #c0c0c0  ; Border abu-abu untuk efek lebih halus
border-radius-left = 15
border-radius-right = 15
margin-top = 15
margin-bottom = 15
; Efek cahaya saat aktif
active-border-color = #ffffff
active-border-size = 2

[LoginScreen.LoginArea.LoginButton]
background-color = #000000
background-opacity = 0.0
active-background-color = #000000
active-background-opacity = 0.2
icon = arrow-right.svg
icon-size = 20
content-color = #ffffff
active-content-color = #ffffff
border-size = 1.5
border-color = #c0c0c0
active-border-color = #ffffff
border-radius-left = 15
border-radius-right = 15
margin-left = 10
show-text-if-no-password = true
hide-if-not-needed = true
font-family = "RedHatDisplay"
font-size = 12
font-weight = 600
; Efek cahaya pada tombol saat hover
glow = true
glow-radius = 8
glow-color = #e0e0e0

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Authenticating..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 24
icon = spinner.svg
color = #ffffff
spacing = 10
; Efek cahaya berputar
glow = true
glow-radius = 10
glow-color = #e0e0e0

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 12
font-weight = 500
normal-color = #c0c0c0
warning-color = #e0e0e0
error-color = #ff605c
margin-top = 15

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 35
border-radius = 8
spacing = 15
font-family = "RedHatDisplay"
background-color = #000000
background-opacity = 0.1
border-size = 1
border-color = #c0c0c0
active-background-opacity = 0.2

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 35
item-spacing = 2
padding = 10
display-scrollbar = false
margin = 10
background-color = #000000
background-opacity = 0.85
active-option-background-color = #ffffff
active-option-background-opacity = 0.15
content-color = #e0e0e0
active-content-color = #ffffff
font-family = "RedHatDisplay"
border-size = 1
border-color = #c0c0c0
font-size = 12
icon-size = 18

[LoginScreen.MenuArea.Session]
display = true
position = bottom-left
index = 4
popup-direction = up
popup-align = left
display-session-name = true
button-width = 140
popup-width = 220
background-color = #000000
background-opacity = 0.0
active-background-opacity = 0.15
content-color = #e0e0e0
active-content-color = #ffffff
border-size = 1
border-color = #c0c0c0
font-size = 12
icon-size = 18

[LoginScreen.MenuArea.Layout]
display = true
position = bottom-left
index = 3
popup-direction = up
popup-align = center
popup-width = 180
display-layout-name = true
background-color = #000000
background-opacity = 0.0
active-background-opacity = 0.15
content-color = #e0e0e0
active-content-color = #ffffff
border-size = 1
border-color = #c0c0c0
font-size = 12
icon = language.svg
icon-size = 18

[LoginScreen.MenuArea.Keyboard]
display = true
position = bottom-left
index = 2
background-color = #000000
background-opacity = 0.0
active-background-opacity = 0.15
content-color = #e0e0e0
active-content-color = #ffffff
border-size = 1
border-color = #c0c0c0
icon = keyboard.svg
icon-size = 18

[LoginScreen.MenuArea.Power]
display = true
position = bottom-left
index = 1
popup-direction = up
popup-align = left
popup-width = 120
background-color = #000000
background-opacity = 0.0
active-background-opacity = 0.15
content-color = #e0e0e0
active-content-color = #ffffff
border-size = 1
border-color = #c0c0c0
icon = power.svg
icon-size = 18

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = login
start-hidden = true
background-color = #000000
background-opacity = 0.85
key-content-color = #e0e0e0
key-color = #000000
key-opacity = 1.0
key-active-background-color = #ffffff
key-active-opacity = 0.15
key-active-content-color = #ffffff
selection-background-color = #303030
selection-content-color = #ffffff
primary-color = #ffffff
border-size = 1
border-color = #c0c0c0

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 12
content-color = #000000
background-color = #ffffff
background-opacity = 0.9
border-radius = 5
disable-user = false
disable-login-button = false
